<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejemplo Box Model</title>
  <style>
    .caja {
      width: 200px;
      height: 100px;
      background-color: lightblue;
      border: 5px solid blue;
      padding: 20px;
    

    }

    .caja2 {
      width: 200px;
      height: 100px;
      background-color: lightblue;
      border: 5px solid blue;
      padding: 20px;
    

    }

        border: 5px solid red;
    }

  </style>
</head>
<body>

  <div class="caja">
    ¡Soy una caja!
  </div>

  <div class="caja2">
    ¡Soy una caja2!
  </div>

</body>
</html>
