<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Condicionales if-else en JavaScript</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
    }
    button {
      margin: 10px 0;
      padding: 10px 15px;
      font-size: 16px;
    }
    .output {
      margin-top: 5px;
      font-weight: bold;
      color: darkblue;
    }
  </style>
  <script src="condicional.js" defer></script>
</head>
<body>

  <h1>Ejemplos de If-Else en JavaScript</h1>

  <!-- Ejemplo 1 -->
  <h3>1. ¿Eres mayor de edad?</h3>
  <button onclick="verificarEdad()">Verificar</button>
  <div id="resultadoEdad" class="output"></div>

  <!-- Ejemplo 2 -->
  <h3>2. ¿El número es positivo o negativo?</h3>
  <button onclick="verificarPositivo()">Verificar</button>
  <div id="resultadoNumero" class="output"></div>

  <!-- Ejemplo 3 -->
  <h3>3. ¿El número es par o impar?</h3>
  <button onclick="verificarPar()">Verificar</button>
  <div id="resultadoPar" class="output"></div>

  <!-- Ejemplo 4 -->
  <h3>4. ¿Aprobaste la evaluación?</h3>
  <button onclick="verificarNota()">Verificar</button>
  <div id="resultadoNota" class="output"></div>

  <!-- Ejemplo 5 -->
  <h3>5. ¿Qué saludo corresponde según la hora?</h3>
  <button onclick="verificarHora()">Verificar</button>
  <div id="resultadoHora" class="output"></div>


</body>
</html>
