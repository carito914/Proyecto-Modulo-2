<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Ejemplo con Switch Case</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
      }
      input,
      button {
        padding: 10px;
        font-size: 16px;
        margin: 5px 0;
      }
      .output {
        margin-top: 10px;
        font-weight: bold;
        color: darkgreen;
      }
    </style>
    <script src="switch.js" defer></script>
  </head>
  <body>
    <h1>Ejemplo con Switch-Case en JavaScript</h1>
    <p>Ingresa un número del 1 al 7 para saber el día de la semana:</p>

    <input type="number" id="numeroDia" min="1" max="7" placeholder="Ej: 1" />
    <button onclick="mostrarDia()">Mostrar día</button>

    <div id="resultadoDia" class="output"></div>
  </body>
</html>
