</head>

  <!-- NAVBAR BOOTSTRAP -->

        <a class="navbar-brand fw-bold" href="index.html">🛒 Nuestra Tienda</a>
ja        <button class="navbar-toggler" type="button"
          data-bs-toggle="collapse"

        <div class="collapse navbar-collapse" id="navbarNav">

  <main class="container my-5">
    <h2 class="mb-2">Escríbenos</h2>
    <p class="mb-4">También puedes escribirnos a: <a href="mailto:contacto@nuestratienda.cl">contacto@nuestratienda.cl</a></p>

    <!--  aca va el formulario -->
    <form action="https://formspree.io/f/TU_ID_AQUI" method="POST" class="formulario-contacto">

      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input 
          type="text" 
          id="nombre" 
          name="nombre" 
          class="form-control" 
          placeholder="Tu nombre completo" 
          required 
        />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-control" 
          placeholder="tucorreo@email.com" 
          required 
        />
      </div>

      <div class="mb-3">
        <label for="mensaje" class="form-label">Mensaje</label>
        <textarea 
          id="mensaje" 
          name="mensaje" 
          class="form-control" 
          rows="5" 
          placeholder="Escribe tu mensaje aquí..." 
          required
        ></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Enviar </button>

    </form>
  </main>

  <!-- FOOTER MEJORADO -->
  <footer class="bg-primary text-white text-center py-3 mt-5">
